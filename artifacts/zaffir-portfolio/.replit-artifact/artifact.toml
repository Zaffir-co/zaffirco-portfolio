kind = "web"
previewPath = "/"
title = "Zaffir.co Portfolio"
version = "1.0.0"
id = "artifacts/zaffir-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18790

[services.development]
run = "pnpm --filter @workspace/zaffir-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zaffir-portfolio", "run", "build" ]
publicDir = "artifacts/zaffir-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18790"
BASE_PATH = "/"
